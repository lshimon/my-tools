<!doctype html>
<!--
  Pixel Clock — ambient 8-bit clock for a second monitor.
  Open in browser > drag to second monitor > Cmd+Ctrl+F (Mac) / F11 (Win) for fullscreen.
  Mouse: move to reveal control bar at the bottom. Click to control.
  Keys:  S=sec  W=widget  Space=start/stop  R=reset  Arrows=adjust timer
         P=pin new timer (opens form)  Esc=close form
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Pixel Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0b0d1a;
      --fg:       #9bbc0f;
      --fg-dim:   #4a6b1f;
      --fg-faint: #2a3d15;
      --tm:       #ffb000;
      --tm-dim:   #7a5500;
      --done:     #ff3030;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: 'Press Start 2P', ui-monospace, Menlo, monospace;
      overflow: hidden;
      user-select: none;
      -webkit-font-smoothing: none;
      image-rendering: pixelated;
    }

    input, textarea { user-select: text !important; }

    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 2;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px
      );
      mix-blend-mode: multiply;
    }
    body::after {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 1;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0) 50%, rgba(0,0,0,0.55) 100%);
    }

    /* ── Layout ─────────────────────────────────── */
    .stage {
      position: relative; z-index: 3;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3.5vmin; text-align: center;
    }

    /* ── Clock ──────────────────────────────────── */
    .time {
      font-size: clamp(4rem, 18vmin, 24rem);
      letter-spacing: 0.05em; color: var(--fg);
      text-shadow: 0 0 8px rgba(155,188,15,.35), 0 0 24px rgba(155,188,15,.15);
      line-height: 1;
    }
    .sec-group {
      display: inline-block; vertical-align: middle;
      font-size: .42em; color: var(--fg-dim);
      max-width: 8em; overflow: hidden; white-space: nowrap;
      transition: max-width .35s ease, opacity .3s ease;
    }
    .sec-group.hidden { max-width: 0; opacity: 0; }

    .date {
      font-size: clamp(.9rem, 2.6vmin, 2.2rem);
      color: var(--fg-dim); letter-spacing: .15em;
    }
    .day {
      font-size: clamp(.7rem, 1.8vmin, 1.6rem);
      color: var(--fg-faint); letter-spacing: .3em;
    }

    /* ── Main widget ────────────────────────────── */
    .widget-divider {
      width: 18vmin; height: 2px;
      background: var(--fg-faint); display: none; opacity: .6;
    }
    .widget-divider.active { display: block; }
    .widget { display: none; flex-direction: column; align-items: center; gap: 1.8vmin; }
    .widget.active { display: flex; }
    .widget-label { font-size: clamp(.5rem, 1.3vmin, 1.1rem); letter-spacing: .35em; color: var(--fg-faint); }
    .widget-display {
      font-size: clamp(1.8rem, 6vmin, 7rem);
      letter-spacing: .08em; color: var(--fg-dim);
      transition: color .25s, text-shadow .25s; line-height: 1;
    }
    .widget-display.running  { color: var(--fg); text-shadow: 0 0 8px rgba(155,188,15,.45); }
    .widget-display.tm       { color: var(--tm-dim); }
    .widget-display.tm.running { color: var(--tm); text-shadow: 0 0 8px rgba(255,176,0,.45); }
    .widget-display.tm.done  { color: var(--done); text-shadow: 0 0 12px rgba(255,48,48,.55); }
    .widget-status { font-size: clamp(.42rem, 1vmin, .9rem); color: var(--fg-faint); letter-spacing: .2em; min-height: 1.4em; }

    /* ── Control bar ────────────────────────────── */
    .ctrl-bar {
      position: fixed; bottom: 3.5vmin; left: 50%;
      transform: translateX(-50%);
      display: flex; align-items: center; gap: 1vmin;
      z-index: 10; opacity: 1; transition: opacity .4s;
    }
    .cursor-hidden .ctrl-bar { opacity: 0; pointer-events: none; }

    .ctrl-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(.45rem, 1.1vmin, .9rem);
      background: rgba(11,13,26,.9);
      border: 1px solid var(--fg-faint); color: var(--fg-dim);
      padding: .55em .85em; cursor: pointer;
      letter-spacing: .1em;
      transition: border-color .15s, color .15s, background .15s;
      outline: none;
    }
    .ctrl-btn:hover, .ctrl-btn:focus  { border-color: var(--fg); color: var(--fg); outline: none; }
    .ctrl-btn.active { border-color: var(--fg); color: var(--fg); background: rgba(155,188,15,.08); }
    .ctrl-btn.tm-btn         { border-color: var(--tm-dim); color: var(--tm-dim); }
    .ctrl-btn.tm-btn:hover   { border-color: var(--tm); color: var(--tm); }
    .ctrl-btn.tm-btn.active  { border-color: var(--tm); color: var(--tm); background: rgba(255,176,0,.08); }
    .ctrl-btn.tm-btn.off     { border-color: #2a1e00; color: #2a1e00; cursor: default; }
    .ctrl-btn.close-btn      { border-color: #3a1a1a; color: #5a2a2a; }
    .ctrl-btn.close-btn:hover { border-color: var(--done); color: var(--done); }
    .ctrl-sep { color: var(--fg-faint); font-size: clamp(.4rem,.9vmin,.8rem); padding: 0 .3vmin; pointer-events: none; }

    .ctrl-hints {
      position: fixed; bottom: 1.2vmin; left: 50%;
      transform: translateX(-50%);
      font-size: clamp(.35rem, .8vmin, .7rem);
      color: var(--fg-faint); letter-spacing: .15em;
      white-space: nowrap; z-index: 10; opacity: 1; transition: opacity .4s;
    }
    .cursor-hidden .ctrl-hints { opacity: 0; pointer-events: none; }

    /* ── Pinned timers panel ─────────────────────── */
    .pinned-panel {
      position: fixed; right: 0; top: 50%;
      transform: translateY(-50%);
      width: 210px;
      max-height: 85vh; overflow-y: auto;
      z-index: 20;
      display: flex; flex-direction: column; gap: .7vmin;
      padding: .8vmin .8vmin .8vmin 0;
    }
    .pinned-panel::-webkit-scrollbar { width: 2px; }
    .pinned-panel::-webkit-scrollbar-thumb { background: var(--fg-faint); }

    .pinned-card {
      background: rgba(11,13,26,.9);
      border: 1px solid var(--fg-faint); border-right: none;
      padding: .7em .7em .6em;
      display: flex; flex-direction: column; gap: .45em;
    }
    .pinned-card.done-card { border-color: var(--done); }

    .pinned-label-text {
      font-size: clamp(.38rem, .95vmin, .8rem);
      color: var(--fg-dim); letter-spacing: .25em;
      overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    }
    .pinned-time-val {
      font-size: clamp(.85rem, 2.6vmin, 2.4rem);
      letter-spacing: .06em; color: var(--fg-dim); line-height: 1;
      transition: color .2s, text-shadow .2s;
    }
    .pinned-time-val.running    { color: var(--tm); text-shadow: 0 0 6px rgba(255,176,0,.4); }
    .pinned-time-val.sw-running { color: var(--fg); text-shadow: 0 0 6px rgba(155,188,15,.4); }
    .pinned-time-val.done       { color: var(--done); text-shadow: 0 0 8px rgba(255,48,48,.45); }

    .add-type-row { display: flex; gap: .5em; }
    .add-type-row .ctrl-btn { flex: 1; text-align: center; }

    .pinned-controls { display: flex; gap: .3em; }
    .pinned-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(.32rem, .82vmin, .68rem);
      background: rgba(11,13,26,.9);
      border: 1px solid var(--fg-faint); color: var(--fg-dim);
      padding: .38em .5em; cursor: pointer; letter-spacing: .08em;
      transition: border-color .12s, color .12s; outline: none;
    }
    .pinned-btn:hover, .pinned-btn:focus { border-color: var(--fg); color: var(--fg); outline: none; }
    .pinned-btn.active  { border-color: var(--fg); color: var(--fg); }
    .pinned-btn.tm-btn  { border-color: var(--tm-dim); color: var(--tm-dim); }
    .pinned-btn.tm-btn:hover  { border-color: var(--tm); color: var(--tm); }
    .pinned-btn.tm-btn.active { border-color: var(--tm); color: var(--tm); }
    .pinned-btn.close-btn     { border-color: #3a1a1a; color: #5a2a2a; }
    .pinned-btn.close-btn:hover { border-color: var(--done); color: var(--done); }

    .pinned-add-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(.32rem, .82vmin, .68rem);
      background: rgba(11,13,26,.9);
      border: 1px solid var(--fg-faint); border-right: none;
      color: var(--fg-faint);
      padding: .5em .7em; cursor: pointer;
      letter-spacing: .15em; width: 100%; text-align: center;
      transition: border-color .12s, color .12s; outline: none;
    }
    .pinned-add-btn:hover { border-color: var(--fg); color: var(--fg); }

    /* ── Add timer form overlay ──────────────────── */
    .add-overlay {
      position: fixed; inset: 0;
      background: rgba(11,13,26,.78);
      z-index: 50; display: none;
      align-items: center; justify-content: center;
    }
    .add-overlay.active { display: flex; }

    .add-form {
      background: var(--bg);
      border: 1px solid var(--fg-dim);
      padding: 2.2em 2em;
      display: flex; flex-direction: column; gap: 1.4em;
      min-width: 290px;
    }
    .add-form-title {
      font-size: clamp(.55rem, 1.3vmin, 1rem);
      color: var(--fg); letter-spacing: .3em;
    }
    .add-label-input {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(.48rem, 1.1vmin, .9rem);
      background: rgba(155,188,15,.04);
      border: 1px solid var(--fg-dim);
      color: var(--fg); padding: .65em .75em;
      letter-spacing: .12em; width: 100%;
      outline: none; text-transform: uppercase;
    }
    .add-label-input:focus { border-color: var(--fg); }
    .add-label-input::placeholder { color: var(--fg-faint); font-size: .9em; }

    .add-time-display {
      font-size: clamp(1.4rem, 4vmin, 3.5rem);
      color: var(--tm); letter-spacing: .08em; text-align: center;
    }
    .add-time-btns {
      display: flex; gap: .4em; justify-content: center; flex-wrap: wrap;
    }
    .add-actions { display: flex; gap: .5em; justify-content: flex-end; }

    /* ── Alarm overlay ───────────────────────────── */
    .alarm-overlay {
      position: fixed; inset: 0; z-index: 45;
      background: #ff2020; opacity: 0; pointer-events: none;
    }
    .alarm-overlay.active {
      animation: alarmFlash .55s steps(2,start) 4 forwards;
    }
    @keyframes alarmFlash {
      0%, 100% { opacity: 0; }
      50%       { opacity: 0.22; }
    }

    /* ── Misc ───────────────────────────────────── */
    @keyframes flash {
      0%, 100% { opacity: 1; }
      50%       { opacity: .15; }
    }
    .flashing { animation: flash .5s steps(2,start) infinite; }

    .cursor-hidden, .cursor-hidden * { cursor: none !important; }

    #bg-canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 0; pointer-events: none;
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div class="stage">
    <div class="time">
      <span id="hh">--</span><span>:</span><span id="mm">--</span><span class="sec-group" id="sec-group"><span>:</span><span id="ss">--</span></span>
    </div>
    <div class="date" id="date">----</div>
    <div class="day"  id="day">----</div>
    <div class="widget-divider" id="widget-divider"></div>
    <div class="widget" id="widget">
      <div class="widget-label"   id="widget-label"></div>
      <div class="widget-display" id="widget-display">00:00.0</div>
      <div class="widget-status"  id="widget-status"></div>
    </div>
  </div>

  <div class="alarm-overlay" id="alarm-overlay"></div>

  <div class="ctrl-bar" id="ctrl-bar"></div>
  <div class="ctrl-hints">S=SEC &nbsp; W=WIDGET &nbsp; SPACE=START/STOP &nbsp; R=RESET &nbsp; ARROWS=TIMER &nbsp; P=PIN TIMER/SW &nbsp; B=BG &nbsp; C=COLOR</div>

  <!-- Pinned timers panel (always visible when populated) -->
  <div class="pinned-panel" id="pinned-panel"></div>

  <!-- Add pinned timer/stopwatch form -->
  <div class="add-overlay" id="add-overlay">
    <div class="add-form">
      <div class="add-form-title" id="add-form-title">PIN A TIMER</div>
      <div class="add-type-row">
        <button class="ctrl-btn tm-btn active" id="add-type-timer" onclick="setAddType('timer')">TIMER</button>
        <button class="ctrl-btn" id="add-type-sw" onclick="setAddType('stopwatch')">STOPWATCH</button>
      </div>
      <input type="text" id="add-label-input" class="add-label-input" placeholder="LABEL..." maxlength="18" autocomplete="off" spellcheck="false">
      <div id="add-time-section">
        <div class="add-time-display" id="add-time-display">05:00</div>
        <div class="add-time-btns">
          <button class="ctrl-btn tm-btn" onclick="adjAddTime(-3600000)">-1H</button>
          <button class="ctrl-btn tm-btn" onclick="adjAddTime(+3600000)">+1H</button>
          <button class="ctrl-btn tm-btn" onclick="adjAddTime(-60000)">-1M</button>
          <button class="ctrl-btn tm-btn" onclick="adjAddTime(+60000)">+1M</button>
          <button class="ctrl-btn tm-btn" onclick="adjAddTime(-10000)">-10S</button>
          <button class="ctrl-btn tm-btn" onclick="adjAddTime(+10000)">+10S</button>
        </div>
      </div>
      <div class="add-actions">
        <button class="ctrl-btn tm-btn" onclick="confirmAddPinned()">ADD</button>
        <button class="ctrl-btn close-btn" onclick="hideAddForm()">CANCEL</button>
      </div>
      <div style="font-size:clamp(.3rem,.7vmin,.6rem);color:var(--fg-faint);letter-spacing:.15em;text-align:center">TAB=SWITCH TYPE &nbsp; ENTER=ADD &nbsp; ESC=CANCEL</div>
    </div>
  </div>

  <script>
    const pad = n => String(n).padStart(2,'0');
    const DAYS   = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
    const MONTHS = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

    // ── Clock ──────────────────────────────────────────────────────────────
    const hhEl   = document.getElementById('hh');
    const mmEl   = document.getElementById('mm');
    const ssEl   = document.getElementById('ss');
    const dateEl = document.getElementById('date');
    const dayEl  = document.getElementById('day');

    function tickClock() {
      const d = new Date();
      hhEl.textContent   = pad(d.getHours());
      mmEl.textContent   = pad(d.getMinutes());
      ssEl.textContent   = pad(d.getSeconds());
      dateEl.textContent = `${pad(d.getDate())} ${MONTHS[d.getMonth()]} ${d.getFullYear()}`;
      dayEl.textContent  = DAYS[d.getDay()];
    }
    tickClock();
    setTimeout(() => { tickClock(); setInterval(tickClock, 1000); }, 1000 - Date.now() % 1000);

    // ── Cursor / control bar visibility ────────────────────────────────────
    let cursorTimer;
    function showCursor() {
      document.body.classList.remove('cursor-hidden');
      clearTimeout(cursorTimer);
      cursorTimer = setTimeout(() => document.body.classList.add('cursor-hidden'), 2500);
    }
    document.addEventListener('mousemove', showCursor);
    showCursor();

    // ── Seconds toggle ─────────────────────────────────────────────────────
    const secGroup = document.getElementById('sec-group');
    function toggleSec() { secGroup.classList.toggle('hidden'); renderControls(); }

    // ── Formatters ─────────────────────────────────────────────────────────
    const fmtSW = ms => {
      const m = Math.floor(ms / 60000);
      const s = Math.floor((ms % 60000) / 1000);
      const t = Math.floor((ms % 1000) / 100);
      return `${pad(m)}:${pad(s)}.${t}`;
    };
    const fmtTM = ms => {
      if (ms <= 0) return '00:00';
      const s = Math.floor(ms / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      if (h > 0) return m > 0 ? `${h}h ${m}m` : `${h}h`;
      return `${pad(m)}:${pad(sec)}`;
    };

    // ── Main widget state ──────────────────────────────────────────────────
    const widgetEl  = document.getElementById('widget');
    const dividerEl = document.getElementById('widget-divider');
    const labelEl   = document.getElementById('widget-label');
    const displayEl = document.getElementById('widget-display');
    const statusEl  = document.getElementById('widget-status');

    let widgetMode = 0;
    let swRunning = false, swStart = 0, swElapsed = 0;
    const TM_DEFAULT = 5 * 60 * 1000;
    let tmTotal = TM_DEFAULT, tmRemaining = TM_DEFAULT;
    let tmRunning = false, tmStart = 0, tmDone = false;
    let raf = null, doneTimer = null;

    const swMs = () => swRunning ? swElapsed + (Date.now() - swStart) : swElapsed;
    const tmMs = () => tmRunning ? tmRemaining - (Date.now() - tmStart) : tmRemaining;

    function rafLoop() {
      if (widgetMode === 1) {
        displayEl.textContent = fmtSW(swMs());
      } else if (widgetMode === 2) {
        const left = tmMs();
        if (left <= 0 && tmRunning) {
          tmRunning = false; tmRemaining = 0; tmDone = true;
          cancelAnimationFrame(raf); raf = null;
          displayEl.textContent = '00:00';
          displayEl.classList.add('flashing');
          statusEl.textContent = 'DONE';
          triggerAlarm('TIMER');
          renderControls();
          return;
        }
        displayEl.textContent = fmtTM(left);
      }
      raf = requestAnimationFrame(rafLoop);
    }

    function startLoop() {
      if (raf) cancelAnimationFrame(raf);
      raf = requestAnimationFrame(rafLoop);
    }

    function renderWidget() {
      const on = widgetMode > 0;
      widgetEl.classList.toggle('active', on);
      dividerEl.classList.toggle('active', on);
      if (!on) { renderControls(); return; }
      if (widgetMode === 1) {
        labelEl.textContent = 'STOPWATCH';
        displayEl.className = 'widget-display' + (swRunning ? ' running' : '');
        displayEl.textContent = fmtSW(swMs());
        statusEl.textContent = swRunning ? 'RUNNING' : swElapsed > 0 ? 'PAUSED' : '';
      } else {
        labelEl.textContent = 'TIMER';
        displayEl.className = 'widget-display tm' + (tmRunning ? ' running' : '') + (tmDone ? ' done' : '');
        displayEl.textContent = fmtTM(tmMs());
        statusEl.textContent = tmDone ? 'DONE' : tmRunning ? 'RUNNING' : tmRemaining < tmTotal ? 'PAUSED' : '';
      }
      renderControls();
    }

    // ── Control bar ────────────────────────────────────────────────────────
    function btn(label, fn, cls = '') {
      return `<button class="ctrl-btn ${cls}" onclick="${fn}">${label}</button>`;
    }
    function sep() { return '<span class="ctrl-sep">|</span>'; }

    function renderControls() {
      const bar = document.getElementById('ctrl-bar');
      const secOn = !secGroup.classList.contains('hidden');
      let html = btn('SEC', 'toggleSec()', secOn ? 'active' : '');

      if (widgetMode === 0) {
        html += sep() + btn('STOPWATCH', 'setWidget(1)') + btn('TIMER', 'setWidget(2)');
      } else if (widgetMode === 1) {
        html += sep()
          + btn(swRunning ? '⏸ PAUSE' : '▶ START', 'widgetStartStop()', swRunning ? 'active' : '')
          + btn('↺ RESET', 'widgetReset()')
          + sep() + btn('✕ CLOSE', 'setWidget(0)', 'close-btn');
      } else {
        const canAdj = !tmRunning && !tmDone;
        const adj = (lbl, fn) => `<button class="ctrl-btn tm-btn${canAdj ? '' : ' off'}" onclick="${canAdj ? fn : ''}">${lbl}</button>`;
        html += sep() + adj('-1H','tmAdjust(-3600000)') + adj('+1H','tmAdjust(+3600000)') + adj('-1M','tmAdjust(-60000)') + adj('+1M','tmAdjust(+60000)') + adj('-10S','tmAdjust(-10000)') + adj('+10S','tmAdjust(+10000)') + sep();
        if (!tmDone) html += btn(tmRunning ? '⏸ PAUSE' : '▶ START', 'widgetStartStop()', tmRunning ? 'tm-btn active' : 'tm-btn');
        html += btn('↺ RESET', 'widgetReset()') + sep() + btn('✕ CLOSE', 'setWidget(0)', 'close-btn');
      }
      html += sep() + btn('+ PIN', 'showAddForm()', '');
      html += sep() + btn('BG:' + BG_NAMES[bgMode], 'cycleBg()', bgMode > 0 ? 'active' : '');
      html += sep() + btn('CLR:' + THEMES[themeIdx].name, 'cycleTheme()', '');
      bar.innerHTML = html;
    }

    // ── Main widget actions ────────────────────────────────────────────────
    function setWidget(mode) {
      stopAlarm();
      if (swRunning) { swElapsed += Date.now() - swStart; swRunning = false; }
      if (tmRunning) { tmRemaining -= Date.now() - tmStart; tmRunning = false; }
      if (raf) { cancelAnimationFrame(raf); raf = null; }
      displayEl.classList.remove('flashing');
      if (doneTimer) { clearTimeout(doneTimer); doneTimer = null; }
      widgetMode = mode;
      if (mode === 2) requestNotifPermission();
      renderWidget();
    }

    function widgetStartStop() {
      if (widgetMode === 1) {
        if (swRunning) { swElapsed += Date.now() - swStart; swRunning = false; if (raf) { cancelAnimationFrame(raf); raf = null; } }
        else           { swStart = Date.now(); swRunning = true; startLoop(); }
        renderWidget();
      } else if (widgetMode === 2) {
        if (tmDone || tmRemaining <= 0) return;
        if (tmRunning) { tmRemaining -= Date.now() - tmStart; tmRunning = false; if (raf) { cancelAnimationFrame(raf); raf = null; } }
        else           { tmStart = Date.now(); tmRunning = true; startLoop(); }
        renderWidget();
      }
    }

    function widgetReset() {
      stopAlarm();
      if (widgetMode === 1) {
        swRunning = false; swElapsed = 0;
        if (raf) { cancelAnimationFrame(raf); raf = null; }
      } else if (widgetMode === 2) {
        tmRunning = false; tmDone = false; tmRemaining = tmTotal;
        if (raf) { cancelAnimationFrame(raf); raf = null; }
        displayEl.classList.remove('flashing');
      }
      renderWidget();
    }

    function tmAdjust(delta) {
      if (tmRunning || tmDone) return;
      tmTotal = Math.max(0, Math.min(tmTotal + delta, 99 * 3600000 + 59 * 60000 + 59000));
      tmRemaining = tmTotal;
      renderWidget();
    }

    // ── Pinned timers ──────────────────────────────────────────────────────
    let pinnedTimers = [];
    let pinnedInterval = null;

    function startPinnedLoop() {
      if (!pinnedInterval) pinnedInterval = setInterval(tickPinned, 250);
    }
    function stopPinnedLoopIfIdle() {
      if (pinnedTimers.every(t => !t.running) && pinnedInterval) {
        clearInterval(pinnedInterval); pinnedInterval = null;
      }
    }

    function tickPinned() {
      let needFull = false;
      pinnedTimers.forEach(pt => {
        if (!pt.running) return;
        if (pt.type === 'timer') {
          const left = pt.remaining - (Date.now() - pt.startTime);
          if (left <= 0) {
            pt.running = false; pt.remaining = 0; pt.done = true;
            needFull = true;
            triggerAlarm(pt.label);
          }
        }
      });
      if (needFull) renderPinned();
      else          updatePinnedTimes();
      stopPinnedLoopIfIdle();
    }

    function updatePinnedTimes() {
      pinnedTimers.forEach(pt => {
        if (!pt.running) return;
        const el = document.getElementById(`pt-time-${pt.id}`);
        if (!el) return;
        if (pt.type === 'stopwatch') {
          el.textContent = fmtSW(pt.elapsed + (Date.now() - pt.startTime));
        } else {
          el.textContent = fmtTM(Math.max(0, pt.remaining - (Date.now() - pt.startTime)));
        }
      });
    }

    function renderPinned() {
      const panel = document.getElementById('pinned-panel');
      let html = '';
      pinnedTimers.forEach(pt => {
        if (pt.type === 'stopwatch') {
          const ms   = pt.elapsed + (pt.running ? Date.now() - pt.startTime : 0);
          const tcls = pt.running ? 'sw-running' : '';
          html += `
            <div class="pinned-card">
              <div class="pinned-label-text">${pt.label}</div>
              <div class="pinned-time-val ${tcls}" id="pt-time-${pt.id}">${fmtSW(ms)}</div>
              <div class="pinned-controls">
                <button class="pinned-btn${pt.running ? ' active' : ''}" onclick="togglePinned(${pt.id})">${pt.running ? '⏸' : '▶'}</button>
                <button class="pinned-btn" onclick="resetPinned(${pt.id})">↺</button>
                <button class="pinned-btn close-btn" onclick="removePinned(${pt.id})">✕</button>
              </div>
            </div>`;
        } else {
          const ms   = Math.max(0, pt.remaining - (pt.running ? Date.now() - pt.startTime : 0));
          const tcls = pt.done ? 'done' : pt.running ? 'running' : '';
          const ccls = pt.done ? 'done-card' : '';
          html += `
            <div class="pinned-card ${ccls}">
              <div class="pinned-label-text">${pt.label}</div>
              <div class="pinned-time-val ${tcls}" id="pt-time-${pt.id}">${fmtTM(ms)}</div>
              <div class="pinned-controls">
                ${!pt.done
                  ? `<button class="pinned-btn tm-btn${pt.running ? ' active' : ''}" onclick="togglePinned(${pt.id})">${pt.running ? '⏸' : '▶'}</button>`
                  : ''}
                <button class="pinned-btn" onclick="resetPinned(${pt.id})">↺</button>
                <button class="pinned-btn close-btn" onclick="removePinned(${pt.id})">✕</button>
              </div>
            </div>`;
        }
      });
      html += `<button class="pinned-add-btn" onclick="showAddForm()">+ ADD</button>`;
      panel.innerHTML = html;
    }

    function togglePinned(id) {
      const pt = pinnedTimers.find(t => t.id === id);
      if (!pt) return;
      if (pt.type === 'timer' && pt.done) return;
      if (pt.running) {
        if (pt.type === 'stopwatch') pt.elapsed += Date.now() - pt.startTime;
        else                         pt.remaining -= Date.now() - pt.startTime;
        pt.running = false;
      } else {
        pt.startTime = Date.now(); pt.running = true; startPinnedLoop();
      }
      renderPinned();
    }

    function resetPinned(id) {
      const pt = pinnedTimers.find(t => t.id === id);
      if (!pt) return;
      pt.running = false;
      if (pt.type === 'stopwatch') { pt.elapsed = 0; }
      else                         { pt.done = false; pt.remaining = pt.total; }
      renderPinned(); stopPinnedLoopIfIdle();
    }

    function removePinned(id) {
      pinnedTimers = pinnedTimers.filter(t => t.id !== id);
      renderPinned(); stopPinnedLoopIfIdle();
    }

    // ── Add form ───────────────────────────────────────────────────────────
    let addFormTime = 5 * 60 * 1000;
    let addType = 'timer';
    let addFormOpen = false;

    function setAddType(type) {
      addType = type;
      document.getElementById('add-type-timer').classList.toggle('active', type === 'timer');
      document.getElementById('add-type-sw').classList.toggle('active',    type === 'stopwatch');
      document.getElementById('add-type-timer').classList.toggle('tm-btn', type === 'timer');
      document.getElementById('add-type-sw').classList.toggle('tm-btn',    type === 'stopwatch');
      document.getElementById('add-time-section').style.display = type === 'timer' ? '' : 'none';
      document.getElementById('add-form-title').textContent = type === 'timer' ? 'PIN A TIMER' : 'PIN A STOPWATCH';
    }

    function showAddForm() {
      requestNotifPermission();
      addType = 'timer';
      addFormTime = 5 * 60 * 1000;
      setAddType('timer');
      document.getElementById('add-time-display').textContent = fmtTM(addFormTime);
      document.getElementById('add-label-input').value = '';
      document.getElementById('add-overlay').classList.add('active');
      addFormOpen = true;
      setTimeout(() => document.getElementById('add-label-input').focus(), 60);
    }

    function hideAddForm() {
      document.getElementById('add-overlay').classList.remove('active');
      addFormOpen = false;
      document.body.focus();
    }

    function adjAddTime(delta) {
      addFormTime = Math.max(10000, Math.min(addFormTime + delta, 99 * 3600000 + 59 * 60000 + 59000));
      document.getElementById('add-time-display').textContent = fmtTM(addFormTime);
    }

    function confirmAddPinned() {
      const raw   = document.getElementById('add-label-input').value.trim().toUpperCase();
      const id    = Date.now();
      if (addType === 'stopwatch') {
        const label = raw || 'SW';
        pinnedTimers.push({ id, type: 'stopwatch', label, elapsed: 0, running: false, startTime: 0 });
      } else {
        const label = raw || 'TIMER';
        pinnedTimers.push({ id, type: 'timer', label, total: addFormTime, remaining: addFormTime, running: false, done: false, startTime: 0 });
      }
      hideAddForm();
      renderPinned();
    }

    // ── Keyboard ───────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      // Inside the label input
      if (e.target.tagName === 'INPUT') {
        if (e.key === 'Enter')  { e.preventDefault(); confirmAddPinned(); }
        if (e.key === 'Escape') { e.preventDefault(); hideAddForm(); }
        if (e.key === 'Tab')    { e.preventDefault(); setAddType(addType === 'timer' ? 'stopwatch' : 'timer'); }
        return;
      }
      // Form is open but focus is on a button — block all global shortcuts.
      // Tab toggles type; Space/Enter let the browser click the focused button naturally.
      if (addFormOpen) {
        if (e.key === 'Escape') { hideAddForm(); }
        if (e.key === 'Tab')    { e.preventDefault(); setAddType(addType === 'timer' ? 'stopwatch' : 'timer'); }
        return;
      }
      // Normal global shortcuts
      switch (e.key) {
        case 's': case 'S':     toggleSec();                              break;
        case 'w': case 'W':     setWidget((widgetMode + 1) % 3);         break;
        case ' ':               e.preventDefault(); widgetStartStop();    break;
        case 'r': case 'R':     widgetReset();                            break;
        case 'p': case 'P':     showAddForm();                            break;
        case 'b': case 'B':     cycleBg();                                break;
        case 'c': case 'C':     cycleTheme();                             break;
        case 'Escape':          hideAddForm();                            break;
        case 'ArrowUp':         e.preventDefault(); tmAdjust(+60000);     break;
        case 'ArrowDown':       e.preventDefault(); tmAdjust(-60000);     break;
        case 'ArrowRight':      e.preventDefault(); tmAdjust(+10000);     break;
        case 'ArrowLeft':       e.preventDefault(); tmAdjust(-10000);     break;
      }
    });

    // ── Audio ──────────────────────────────────────────────────────────────
    let audioCtx = null;
    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playBeepPattern() {
      const ctx = getAudio();
      const now = ctx.currentTime;
      const notes = [
        { freq: 440,  t: 0.00, dur: 0.07 },
        { freq: 554,  t: 0.10, dur: 0.07 },
        { freq: 659,  t: 0.20, dur: 0.07 },
        { freq: 880,  t: 0.33, dur: 0.22 },
      ];
      notes.forEach(({ freq, t, dur }) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.value = freq;
        osc.connect(gain); gain.connect(ctx.destination);
        gain.gain.setValueAtTime(0, now + t);
        gain.gain.linearRampToValueAtTime(0.10, now + t + 0.005);
        gain.gain.setValueAtTime(0.10, now + t + dur - 0.01);
        gain.gain.linearRampToValueAtTime(0, now + t + dur);
        osc.start(now + t); osc.stop(now + t + dur + 0.02);
      });
    }

    let alarmCount = 0, alarmTick = null;
    function startAlarm() {
      alarmCount = 0; playBeepPattern();
      alarmTick = setInterval(() => {
        alarmCount++;
        if (alarmCount < 4) playBeepPattern();
        else { clearInterval(alarmTick); alarmTick = null; }
      }, 900);
    }
    function stopAlarm() {
      if (alarmTick) { clearInterval(alarmTick); alarmTick = null; }
    }

    // ── Screen flash ────────────────────────────────────────────────────────
    const alarmOverlay = document.getElementById('alarm-overlay');
    function flashScreen() {
      alarmOverlay.classList.remove('active');
      void alarmOverlay.offsetWidth;
      alarmOverlay.classList.add('active');
      alarmOverlay.addEventListener('animationend', () => alarmOverlay.classList.remove('active'), { once: true });
    }

    // ── Notifications ───────────────────────────────────────────────────────
    function requestNotifPermission() {
      if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
    }

    // ── Alarm trigger ───────────────────────────────────────────────────────
    function triggerAlarm(label = '') {
      startAlarm(); flashScreen(); window.focus();
      if ('Notification' in window && Notification.permission === 'granted') {
        const title = label ? `Done: ${label}` : 'Timer done';
        const body  = label ? `"${label}" finished.` : 'Your timer has finished.';
        new Notification(title, { body });
      }
    }

    // ── Themes ────────────────────────────────────────────────────────────
    const THEMES = [
      { name: 'GREEN', bg: '#0b0d1a', fg: '#9bbc0f', fgDim: '#4a6b1f', fgFaint: '#2a3d15', tm: '#ffb000', tmDim: '#7a5500', done: '#ff3030' },
      { name: 'AMBER', bg: '#0d0900', fg: '#ffb000', fgDim: '#7a5500', fgFaint: '#2a1e00', tm: '#ff6600', tmDim: '#7a3000', done: '#ff2020' },
      { name: 'CYAN',  bg: '#001a1a', fg: '#00e5e5', fgDim: '#007777', fgFaint: '#003333', tm: '#ffb000', tmDim: '#7a5500', done: '#ff3030' },
      { name: 'GHOST', bg: '#0a0a0a', fg: '#d0d0d0', fgDim: '#707070', fgFaint: '#303030', tm: '#ffb000', tmDim: '#7a5500', done: '#ff3030' },
    ];
    let themeIdx = 0;

    function applyTheme(idx) {
      themeIdx = idx;
      const t = THEMES[idx];
      const r = document.documentElement.style;
      r.setProperty('--bg',       t.bg);
      r.setProperty('--fg',       t.fg);
      r.setProperty('--fg-dim',   t.fgDim);
      r.setProperty('--fg-faint', t.fgFaint);
      r.setProperty('--tm',       t.tm);
      r.setProperty('--tm-dim',   t.tmDim);
      r.setProperty('--done',     t.done);
      renderControls();
    }

    function cycleTheme() { applyTheme((themeIdx + 1) % THEMES.length); }

    // ── Background canvas ────────────────────────────────────────────────
    const bgCanvas = document.getElementById('bg-canvas');
    const bgCtx = bgCanvas.getContext('2d');

    function resizeBgCanvas() {
      bgCanvas.width  = window.innerWidth;
      bgCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', () => { resizeBgCanvas(); if (bgMode > 0) initBg(); });
    resizeBgCanvas();

    const BG_NAMES = ['OFF', 'STARS', 'MATRIX', 'GRID'];
    let bgMode = 0;
    let bgRaf = null;

    // Stars
    let stars = [];
    function initStars() {
      stars = Array.from({ length: 160 }, () => ({
        x: Math.random() * bgCanvas.width,
        y: Math.random() * bgCanvas.height,
        z: Math.random(),
        speed: 0.12 + Math.random() * 0.2,
      }));
    }

    function drawStars() {
      bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
      const color = THEMES[themeIdx].fg;
      stars.forEach(s => {
        s.y += s.speed * (0.4 + s.z * 0.6);
        if (s.y > bgCanvas.height) { s.y = 0; s.x = Math.random() * bgCanvas.width; s.z = Math.random(); }
        bgCtx.globalAlpha = 0.1 + s.z * 0.5;
        bgCtx.fillStyle = color;
        const size = Math.max(1, Math.round(1 + s.z * 1.5));
        bgCtx.fillRect(Math.round(s.x), Math.round(s.y), size, size);
      });
      bgCtx.globalAlpha = 1;
      bgRaf = requestAnimationFrame(drawStars);
    }

    // Matrix
    let matrixCols = [];
    const MCHARS = '01234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%*[]{}|<>';

    function initMatrix() {
      const cw = 14;
      const nc = Math.ceil(bgCanvas.width / cw);
      matrixCols = Array.from({ length: nc }, () => ({
        y: -Math.random() * bgCanvas.height * 1.5,
        speed: 1.5 + Math.random() * 2.5,
        len: 8 + Math.floor(Math.random() * 12),
        char: MCHARS[Math.floor(Math.random() * MCHARS.length)],
        tick: Math.floor(Math.random() * 8),
      }));
    }

    function drawMatrix() {
      bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
      const color = THEMES[themeIdx].fg;
      const cw = 14, ch = 14;
      matrixCols.forEach((col, i) => {
        col.y += col.speed;
        if (col.y - col.len * ch > bgCanvas.height) {
          col.y = -Math.random() * bgCanvas.height * 0.5;
          col.speed = 1.5 + Math.random() * 2.5;
          col.len = 8 + Math.floor(Math.random() * 12);
        }
        col.tick++;
        if (col.tick >= 8) { col.char = MCHARS[Math.floor(Math.random() * MCHARS.length)]; col.tick = 0; }
        bgCtx.font = `bold ${ch}px monospace`;
        for (let j = 0; j < col.len; j++) {
          const cy = Math.round(col.y - j * ch);
          if (cy < -ch || cy > bgCanvas.height) continue;
          bgCtx.globalAlpha = j === 0 ? 0.85 : Math.max(0, (1 - j / col.len) * 0.38);
          bgCtx.fillStyle = color;
          bgCtx.fillText(col.char, i * cw, cy);
        }
      });
      bgCtx.globalAlpha = 1;
      bgRaf = requestAnimationFrame(drawMatrix);
    }

    // Pixel grid
    let gridT = 0;
    function drawGrid() {
      bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
      const color = THEMES[themeIdx].fg;
      const sp = 28;
      gridT += 0.008;
      const cx = bgCanvas.width / 2, cy = bgCanvas.height / 2;
      bgCtx.fillStyle = color;
      for (let x = sp; x < bgCanvas.width; x += sp) {
        for (let y = sp; y < bgCanvas.height; y += sp) {
          const dist = Math.sqrt((x - cx) ** 2 + (y - cy) ** 2) / Math.max(cx, cy);
          const wave = Math.sin(gridT * 2 - dist * 4) * 0.5 + 0.5;
          bgCtx.globalAlpha = Math.max(0, 0.03 + wave * 0.09 * (1 - dist * 0.5));
          bgCtx.fillRect(x - 1, y - 1, 2, 2);
        }
      }
      bgCtx.globalAlpha = 1;
      bgRaf = requestAnimationFrame(drawGrid);
    }

    function stopBg() {
      if (bgRaf) { cancelAnimationFrame(bgRaf); bgRaf = null; }
      bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
    }

    function initBg() {
      stopBg();
      if (bgMode === 1) { initStars(); drawStars(); }
      else if (bgMode === 2) { initMatrix(); drawMatrix(); }
      else if (bgMode === 3) { gridT = 0; drawGrid(); }
    }

    function cycleBg() {
      bgMode = (bgMode + 1) % BG_NAMES.length;
      initBg();
      renderControls();
    }

    // ── Init ───────────────────────────────────────────────────────────────
    renderControls();
    renderPinned();

    document.body.tabIndex = 0;
    document.body.focus();

    document.getElementById('ctrl-bar').addEventListener('click', () => {
      getAudio();
      requestAnimationFrame(() => document.body.focus());
    });
    document.getElementById('pinned-panel').addEventListener('click', () => {
      getAudio();
    });

    document.addEventListener('keydown', () => getAudio(), { once: true });
  </script>
</body>
</html>
