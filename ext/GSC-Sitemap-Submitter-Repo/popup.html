<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GSC Sitemap Submitter</title>
  <style>
    body {
      width: 350px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    .container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    textarea {
      width: 100%;
      height: 150px;
      padding: 8px;
      box-sizing: border-box;
      resize: vertical;
    }
    .buttons {
      display: flex;
      gap: 10px;
    }
    button {
      padding: 8px 15px;
      cursor: pointer;
      background-color: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      flex: 1;
    }
    button:hover {
      background-color: #3367d6;
    }
    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    #stopBtn, #pauseBtn {
      background-color: #ea4335;
    }
    #stopBtn:hover, #pauseBtn:hover {
      background-color: #d33426;
    }
    #pauseBtn.paused {
      background-color: #fbbc05;
    }
    #pauseBtn.paused:hover {
      background-color: #f9a825;
    }
    #status {
      font-size: 14px;
      margin-top: 10px;
      color: #555;
    }
    .log-container {
      max-height: 150px;
      overflow-y: auto;
      border: 1px solid #ddd;
      padding: 8px;
      margin-top: 10px;
      background-color: #f5f5f5;
    }
    .log-entry {
      margin-bottom: 5px;
      font-size: 13px;
    }
    .success {
      color: green;
    }
    .error {
      color: red;
    }
    .info {
      color: blue;
    }
    .status-line {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>GSC Sitemap Submitter</h2>
    <div>
      <p>Enter sitemap URLs (one per line):</p>
      <textarea id="sitemapUrls" placeholder="https://example.com/sitemap1.xml&#10;https://example.com/sitemap2.xml&#10;..."></textarea>
    </div>
    <div class="status-line">
      <div id="progress">Progress: 0/0</div>
      <div id="status">Ready</div>
    </div>
    <div class="buttons">
      <button id="runBtn">Run</button>
      <button id="pauseBtn" disabled>Pause</button>
      <button id="stopBtn" disabled>Stop</button>
    </div>
    <div>
      <h3>Log:</h3>
      <div class="log-container" id="logContainer"></div>
    </div>
  </div>
  <script src="js/popup.js"></script>
</body>
</html>
