<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Word Highlighter</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="wh-header">
    <h1>
      <img src="icons/icon32.png" alt="" width="20" height="20" />
      Word Highlighter
    </h1>
    <div class="wh-toggles">
      <label class="wh-toggle">
        <input type="checkbox" id="autoScan" />
        <span>Auto-scan new pages</span>
      </label>
      <label class="wh-toggle">
        <input type="checkbox" id="caseSensitive" />
        <span>Match case</span>
      </label>
    </div>
  </header>

  <section class="wh-input-section">
    <label for="termsInput" class="wh-label">
      Terms (one per line). Phrases work too.
    </label>
    <textarea
      id="termsInput"
      placeholder="qa engineer&#10;python&#10;remote"
      rows="5"
      spellcheck="false"
      autofocus
    ></textarea>
    <div id="status" class="wh-status"></div>
  </section>

  <section class="wh-terms-section">
    <div class="wh-terms-header">
      <h2>Active <span id="termCount" class="wh-count"></span></h2>
      <button id="clearBtn" class="wh-clear">Clear all</button>
    </div>
    <ul id="termsList" class="wh-terms-list"></ul>
    <p id="emptyHint" class="wh-empty-hint">
      Start typing above. Highlights appear as you type.
    </p>
  </section>

  <footer class="wh-footer">
    For local files: enable "Allow access to file URLs" at <code>chrome://extensions</code>.
  </footer>

  <script src="popup.js"></script>
</body>
</html>
